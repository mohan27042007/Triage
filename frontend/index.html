<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triage — Local classifier</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">TRIAGE / LOCAL-FIRST CORE</p>
      <h1>What needs your attention?</h1>
      <p class="intro">Paste a college message or upload a UTF-8 <code>.txt</code> file.</p>

      <form id="ingest-form">
        <label for="text">Message text</label>
        <textarea id="text" name="text" rows="9" placeholder="Paste an email, notice, question-bank item, or announcement..."></textarea>

        <p class="divider"><span>or</span></p>

        <label for="file">Text file</label>
        <input id="file" name="file" type="file" accept=".txt,text/plain" />

        <button type="submit">Classify with Triage</button>
      </form>

      <section id="result" class="result" aria-live="polite" hidden>
        <p id="category" class="badge"></p>
        <p id="reason"></p>
        <dl>
          <div><dt>Deadline</dt><dd id="deadline">—</dd></div>
          <div><dt>Mandatory</dt><dd id="mandatory">—</dd></div>
        </dl>
      </section>
      <p id="error" class="error" role="alert"></p>
    </main>
    <script src="app.js"></script>
  </body>
</html>
